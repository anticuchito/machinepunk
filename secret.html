<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ENTER</title>

<style>

@font-face {

    font-family: 'PixelOperator';

    src: url("/fonts/PixelOperatorSC-Bold.ttf") format("truetype");

    font-display: swap;
}

body {

    margin: 0;

    width: 100%;
    height: 100vh;

    background: #ffffff;

    overflow: hidden;

    position: relative;
}

/* LINEAS VHS */

body::before {

    content: "";

    position: absolute;

    inset: 0;

    background:
    repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0.03) 0px,
    rgba(0,0,0,0.03) 1px,
    transparent 2px,
    transparent 4px
    );

    pointer-events: none;

    z-index: 1;
}

/* TEXTO TOCA */

.touch-text {

    position: fixed;

    top: 70px;

    width: 100%;

    text-align: center;

    font-family: 'PixelOperator', monospace;

    font-size: 12px;

    letter-spacing: 2px;

    color: #000000;

    z-index: 99999;

    animation: touchBlink 1.5s infinite;

    pointer-events: none;
}

/* TITULO */

.ghost-text {

    position: absolute;

    top: 120px;

    left: 0;

    width: 100%;

    text-align: center;

    font-family: 'PixelOperator', monospace;

    font-size: 18px;

    letter-spacing: 2px;

    color: #000000;

    z-index: 20;

    text-shadow:
    1px 0 red,
   -1px 0 cyan;
}

/* TEXTO CARGA */

.loading-text {

    position: absolute;

    bottom: 12%;

    left: 0;

    width: 100%;

    text-align: center;

    font-family: 'PixelOperator', monospace;

    font-size: 12px;

    letter-spacing: 1px;

    color: #000000;

    z-index: 20;

    text-shadow:
    1px 0 red,
   -1px 0 cyan;

    white-space: nowrap;

    overflow: hidden;
}

/* IMAGEN */

.enter-image {

    position: absolute;

    top: 54%;
    left: 50%;

    transform: translate(-50%, -50%);

    z-index: 100;

    cursor: pointer;
}

.enter-image img {

    width: 220px;

    max-width: 70vw;

    height: auto;

    display: block;
}




/* BLOQUES */

.corrupt {

    position: absolute;

    background: rgba(0,0,0,0.04);

    z-index: 10;
}

.c1 {

    width: 120px;
    height: 8px;

    top: 30%;
    left: 20%;
}

.c2 {

    width: 90px;
    height: 6px;

    top: 62%;
    left: 60%;
}

.c3 {

    width: 150px;
    height: 10px;

    top: 78%;
    left: 35%;
}

/* ANIMACION */

@keyframes touchBlink {

    0% {

        opacity: 0.2;
    }

    50% {

        opacity: 1;
    }

    100% {

        opacity: 0.2;
    }
}

</style>

</head>

<body>

<audio id="poemAudio" preload="auto">

<source src="./assets/audio/secret.mp3" type="audio/mpeg">

</audio>

<div class="touch-text">

TOCA LA IMAGEN

</div>

<div class="ghost-text">

> EL_ENCUENTRO

</div>

<div class="loading-text" id="loadingText"></div>

<div class="corrupt c1"></div>
<div class="corrupt c2"></div>
<div class="corrupt c3"></div>

<div class="enter-image" id="enterButton">



<img src="./assets/the_last_pixel.jpg" alt="The Last Pixel">



</div>

<script>

const button = document.getElementById("enterButton");

const audio = document.getElementById("poemAudio");

const loadingText = document.getElementById("loadingText");

const message = "CARGANDO_ARCHIVO: track_el_encuentro";

let index = 0;

function typeWriter() {

    if(index < message.length) {

        loadingText.innerHTML += message.charAt(index);

        index++;

        setTimeout(typeWriter, 250);
    }
}

button.addEventListener("click", () => {

    audio.volume = 0.25;

    audio.play();

    button.style.pointerEvents = "none";

    typeWriter();
});

audio.addEventListener("ended", () => {

    window.location.href = "track_el_encuentro.html";

});

</script>

</body>

</html>
